name: Docker Build

# Déclencheurs : push ou pull request sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Jobs
jobs:
  build:
    # Exécute le job sur une machine Ubuntu
    runs-on: ubuntu-latest

    # Étapes du job
    steps:
      # 1. Checkout le code du dépôt
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurer Docker Buildx (pour construire des images multi-architectures)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Se connecter à Docker Hub (optionnel, si tu veux pousser l'image)
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'  # Ne pas pousser sur les PR
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 4. Construire l'image Docker
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .  # Contexte de build (répertoire racine)
          file: ./Dockerfile  # Chemin vers le Dockerfile
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-devops-b3-epsi:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/docker-devops-b3-epsi:${{ github.sha }}
          # Ne pousse pas l'image sur les PR
          push: ${{ github.event_name != 'pull_request' }}
          # Cache les couches Docker pour accélérer les builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
